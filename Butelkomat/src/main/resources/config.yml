# ============================================
#  Butelkomat Plugin v1.0.0
# ============================================

# Lista Nexo furniture IDs które są butelkomatami
butelkomat-furniture-ids:
  - butelkomat
  # - inny_butelkomat

# Czy oddawać wszystkie sztuki z ręki naraz (true) czy po 1 (false)
return-all-in-hand: true

# Dźwięki
sounds:
  success: ENTITY_EXPERIENCE_ORB_PICKUP
  error: ENTITY_VILLAGER_NO

# Cooldown na klikanie butelkomatu (w milisekundach)
# 500 = pół sekundy, 1000 = sekunda, 250 = bardzo szybkie ale anty-spam
interact-cooldown-ms: 500

# Wiadomości
messages:
  prefix: "&8[&6Butelkomat&8] "
  no-permission: "&cNie masz uprawnień!"
  reload-success: "&aPrzeładowano konfigurację!"
  item-added: "&aDodano przedmiot! Cena: &e{price}$"
  item-removed: "&aUsunięto przedmiot #{index}!"
  item-not-in-hand: "&cTrzymaj przedmiot w ręce!"
  item-not-accepted: "&cTen przedmiot nie jest przyjmowany!"
  item-list-header: "&6=== Akceptowane przedmioty ==="
  item-list-entry: "&e#{index} &7- &f{type} &7- Cena: &e{price}$"
  item-list-empty: "&7Brak przedmiotów."
  return-success: "&aOddano &e{amount}x &fprzedmiot(ów)&a! Otrzymano: &e{total}$"
  invalid-price: "&cPodaj prawidłową cenę!"
  help-header: "&8&m------&8[ &6Butelkomat &8]&m------"
  help-additem: "&e/bm additem <cena> &7- Dodaj przedmiot z ręki"
  help-removeitem: "&e/bm removeitem <numer> &7- Usuń przedmiot"
  help-list: "&e/bm list &7- Lista przedmiotów"
  help-reload: "&e/bm reload &7- Przeładuj"
  help-footer: "&8&m---------------------------"

# Lista zapisanych przedmiotów (zarządzane automatycznie - nie ruszać)
items: []