# ══════════════════════════════════════
# SkyRiseCore — Config ArmorWorld
# ══════════════════════════════════════

# Światy na których zbroja jest zablokowana
# Dodawaj też z gry: /aw add <świat>
blocked-worlds:
  - world_nether

# Zablokowane przedmioty (nazwy Material z Bukkit)
blocked-items:
  - NETHERITE_HELMET
  - NETHERITE_CHESTPLATE
  - NETHERITE_LEGGINGS
  - NETHERITE_BOOTS

# Wiadomość przy zablokowanej teleportacji (MiniMessage)
deny-message: "<red>»</red> <red>Musisz zdjąć zablokowaną zbroję aby wejść na ten świat!"

# Permisja omijająca blokadę
bypass-permission: "skyrise.armorworld.bypass"
