# ══════════════════════════════════════
# SkyRiseCore — Moduł Automat
# Przerobiony z pluginu AetherWave/VendingMachine.
# Kolory: legacy & + HEX &#RRGGBB.
# ══════════════════════════════════════

prefix: "&#38f28f&lAutomat &7» &f"
currency-symbol: "$"

# Cooldown na klikanie automatu (w milisekundach)
interact-cooldown-ms: 500

# ==================
# NEXO INTEGRATION
# ==================
nexo:
  enabled: true
  auto-register-furniture: true
  allow-vanilla-blocks: true
  furniture-mappings:
    # Format: nexo_furniture_id: "nazwa_szablonu"
    vending_machine: "default"

# ==================
# SOUNDS
# ==================
sounds:
  open: "UI_BUTTON_CLICK"
  success: "ENTITY_PLAYER_LEVELUP"
  fail: "ENTITY_VILLAGER_NO"
  restock: "BLOCK_NOTE_BLOCK_PLING"

# ==================
# PARTICLES
# ==================
particles:
  enabled: true
  type: "HAPPY_VILLAGER"
  count: 10

# ==================
# DOMYŚLNE USTAWIENIA SZABLONU
# ==================
default-template:
  rows: 5
  title: "&8Automat"
  fill-empty: false
  filler-material: "BLACK_STAINED_GLASS_PANE"
  filler-name: " "
  border: false
  border-material: "BLACK_STAINED_GLASS_PANE"
  border-name: " "

  close-button:
    enabled: true
    slot: -1
    material: "BARRIER"
    name: "&cZamknij"
    lore:
      - "&7Wróć do gry"

# ==================
# SYSTEM STOCKU
# ==================
stock:
  defaults:
    unlimited: true
    max-stock: 64
    initial-stock: 0

  low-stock-warning:
    enabled: true
    threshold: 5
    scan-interval: 5
    notify-admins: true
    log-to-console: true

  display:
    show-when-unlimited: true
    show-numeric: true
    sold-out-text: "&cWyprzedane!"
    available-text: "&fDostępne: &e{amount} &fszt."
    unlimited-text: "&fDostępność: &e∞"

# ==================
# AUTO-RESTOCK
# ==================
auto-restock:
  defaults:
    enabled: false
    interval: 30
    amount: 10

  min-interval: 1
  max-interval: 1440
  min-amount: 1
  max-amount: 1000

  notify-on-restock: true
  broadcast-restock: false
  broadcast-message: "&#38f28f&lAutomat &7» &fUzupełniono zapasy automatu &e{template}&f."

# ==================
# SAFETY / OCHRONA
# ==================
protection:
  allow-player-break: false
  auto-cleanup: true
  explosion-protection: true

# ==================
# WIADOMOŚCI
# ==================
messages:
  # Ogólne
  no-permission: "&cBrak uprawnień."
  invalid: "&cNieprawidłowa wartość."
  cancelled: "&cAnulowano."

  # Szablony
  created: "&fUtworzono szablon &e{name}&f."
  deleted: "&cUsunięto szablon &e{name}&c."
  not-found: "&cNie znaleziono szablonu &e{name}&c."
  exists: "&cSzablon &e{name} &cjuż istnieje."

  # Stawianie / usuwanie
  placed: "&fPostawiono automat &7(&e{template}&7)&f."
  removed: "&cUsunięto automat."
  placement-mode: "&fTryb stawiania włączony! Kliknij &ePPM &fna blok lub furniture."
  placement-cancelled: "&cAnulowano tryb stawiania."

  # Zakupy
  purchase-success: "&fKupiono &e{item} &fza &e{price}{currency}&f."
  no-money: "&cNie stać cię! Potrzebujesz &e{price}{currency}&c."
  no-space: "&cBrak miejsca w ekwipunku."
  limit-reached: "&cOsiągnięto limit zakupów dla tego przedmiotu."
  disabled: "&cTen automat jest wyłączony."
  sold-out: "&cTen produkt jest wyprzedany!"

  # Stock
  stock-added: "&fDodano &e{amount} &fsztuk do &e{item} &7(stock: &e{stock}&7)."
  stock-removed: "&cUsunięto &e{amount} &csztuk z &e{item} &7(stock: &e{stock}&7)."
  stock-set: "&fUstawiono stock &e{item} &fna &e{amount}&f."
  stock-filled: "&fWypełniono zapasy automatu &e{template}&f do maksimum."
  stock-restocked: "&fWykonano restock automatu &e{template} &7(+&e{amount}&7 szt.)."
  stock-low-warning: "&c⚠ Niski stock w automacie &e{template}&c: &f{item} &7(&e{stock}&7/&e{max}&7) &8- {location}"
  stock-empty: "&c⚠ Wyprzedano &f{item} &cw automacie &e{template}&c! &8- {location}"

  # Itemy
  item-added: "&fDodano przedmiot do automatu."
  item-removed: "&cUsunięto przedmiot z automatu."

  # System
  reload: "&fPrzeładowano konfigurację."

  # Listy / pomoc
  list-header: "&fSzablony automatów:"
  list-entry: "&e{id}. &f{name} &7(&e{rows}&7r, &e{items} &7items, &e{placements} &7instancji)"
  help-header: "&fPomoc modułu automatów:"
