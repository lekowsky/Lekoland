# ══════════════════════════════════════
# SkyRiseCore — Config Chat
# ══════════════════════════════════════

# Zasięg czatu lokalnego w blokach
local-radius: 40

# --- Czat globalny ---

# Cooldown w sekundach (0 = wyłączony)
global-cooldown: 30

# Format czatu globalnego (MiniMessage)
# Dokładnie jak EssentialsX: [G] PREFIX NICKNAME » MESSAGE
# Zmienne: {prefix}, {player}, {group_color}, {message}
# <reset> po {prefix} zabija bold/kolory z prefixu rangi
global-format: "<white>[<aqua>G</aqua>]</white><reset> {prefix}<reset> <gray>{player}<reset> <dark_gray>»<reset> {group_color}{message}"

# Kolory wiadomości per grupa — identyczne jak EssentialsX group-formats
# Kolor wiadomości = kolor rangi
group-colors:
    wlasciciel: "<color:#A30000>"
    wspolwlasciciel: "<color:#E0115F>"
    technik: "<color:#C9A84C>"
    admin: "<color:#FF2A00>"
    moderator: "<color:#FF2A00>"
    kidmod: "<red>"
    helper: "<red>"
    dev: "<color:#A0845A>"
    kiddev: "<color:#E8D4B8>"
    budowniczy: "<dark_green>"
    elita: "<color:#DA2DFF>"
    default: "<white>"

# Wiadomość o cooldownie
# Zmienne: {time}
cooldown-message: "<red>»</red> <red>Musisz odczekać jeszcze {time} sekund przed ponownym użyciem czatu globalnego."
