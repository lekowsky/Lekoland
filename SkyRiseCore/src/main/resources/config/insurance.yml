# ══════════════════════════════════════
# SkyRiseCore — Moduł Ubezpieczenie
# Kolory: legacy & oraz HEX &#RRGGBB
# ══════════════════════════════════════

prefix: "&#f5f242&lUbezpieczenie &7» &f"

economy:
  price: 500.0
  renewal-price: 500.0
  currency-symbol: "$"

insurance:
  # Realny czas ważności polisy. Po tym czasie gracz traci ochronę, jeśli jej wcześniej nie wykorzysta.
  duration-days: 7
  # Gdy do końca zostanie mniej niż X godzin, gracz dostanie powiadomienie po wejściu
  # i będzie mógł przedłużyć polisę.
  expiry-warning-hours: 24
  # Powtarzaj powiadomienie online co X minut, gdy polisa kończy się w oknie powyżej.
  online-warning-interval-minutes: 15
  # Gracz może przedłużyć aktywną polisę dopiero w oknie ostrzeżenia, np. ostatnie 24h.
  allow-renewal: true
  # Co ile minut czyścić wygasłe polisy z pamięci/danych.
  cleanup-interval-minutes: 30


premium:
  permission: "insurance.premium"
  default-effect: "default"
  effects:
    default:
      slot: 10
      material: "TOTEM_OF_UNDYING"
      name: "&f&lStandardowy"
      lore:
        - "&fKlasyczny efekt polisy."
      sound: "ITEM_TOTEM_USE"
      particle: "TOTEM_OF_UNDYING"
      particle-count: 80
    lightning:
      slot: 12
      material: "LIGHTNING_ROD"
      name: "&b&lPiorun"
      lore:
        - "&fEfekt ratunku z błyskiem i grzmotem."
      sound: "ENTITY_LIGHTNING_BOLT_THUNDER"
      particle: "FLASH"
      particle-count: 1
    smoke:
      slot: 14
      material: "CAMPFIRE"
      name: "&8&lDym"
      lore:
        - "&fEfekt ratunku z dymną teleportacją."
      sound: "ENTITY_ENDERMAN_TELEPORT"
      particle: "CAMPFIRE_COSY_SMOKE"
      particle-count: 60
    magic:
      slot: 16
      material: "AMETHYST_SHARD"
      name: "&d&lMagia"
      lore:
        - "&fEfekt ratunku z magicznymi cząsteczkami."
      sound: "ENTITY_PLAYER_LEVELUP"
      particle: "WITCH"
      particle-count: 80

npc:
  # CITIZENS = NPC gracza przez Citizens ze skinem; AUTO = Citizens jeśli jest, inaczej natywny; NATIVE = zwykła encja Bukkit.
  provider: "CITIZENS"
  # Używane tylko przy NATIVE/fallbacku.
  entity-type: "VILLAGER"
  # Nazwa widoczna nad NPC.
  name: "&#f5f242&lUbezpieczyciel"
  # Nazwa techniczna Citizens NPC (bez kolorów), jeśli provider = CITIZENS/AUTO.
  citizens-name: "&#f5f242&lUbezpieczyciel"
  # Skin Citizens NPC — wpisz nick gracza/skina.
  skin: "Steve"
  glowing: false

sounds:
  open: "UI_BUTTON_CLICK"
  purchase: "ENTITY_PLAYER_LEVELUP"
  renewed: "BLOCK_NOTE_BLOCK_PLING"
  already-active: "ENTITY_VILLAGER_NO"
  no-money: "ENTITY_VILLAGER_NO"
  error: "BLOCK_ANVIL_LAND"
  totem-blocked: "ENTITY_VILLAGER_NO"

gui:
  title: "&#f5f242&lUbezpieczenie"
  # Anty-spam otwierania GUI z NPC/komendy w milisekundach.
  open-cooldown-ms: 2000
  size: 27
  fill-empty: true
  filler:
    material: "YELLOW_STAINED_GLASS_PANE"
    name: " "
  insurance-item:
    # Gdy gracz nie ma polisy, item jest na środku.
    slot: 13
    # Gdy gracz ma aktywną polisę, item przesuwa się w lewo, a po prawej pojawia się przedłużenie.
    active-slot: 12
    material: "TOTEM_OF_UNDYING"
    name: "&#f5f242&lUbezpieczenie"
    lore:
      - "&fJednorazowa ochrona przed śmiercią."
      - "&fAktywuje się automatycznie przy zagrożeniu życia."
      - "&fPo użyciu polisa wygasa."
      - ""
      - "&fKoszt: &#f5f242{price}{currency}"
      - "&fStatus: {status}"
      - "&fEfekt: {effect}"
      - "&fWażna jeszcze: &#f5f242{time_left}"
    click-to-buy: "&#f5f242Kliknij, aby kupić polisę."
    already-owned: "&fMasz już aktywną polisę."
  renew-button:
    # Pojawia się dopiero przy aktywnej polisie — obok aktualnej polisy na środku GUI.
    slot: 14
    material: "CLOCK"
    name: "&#f5f242&lPrzedłuż polisę"
    lore:
      - "&fPrzedłuż ważność aktywnej polisy."
      - "&fKoszt: &#f5f242{renewal_price}{currency}"
      - "&fWażna jeszcze: &#f5f242{time_left}"
      - ""
      - "&7Dostępne w ostatnich 24h ważności."
  effect-menu-button:
    # Lewy dolny róg głównego GUI.
    slot: 18
    material: "AMETHYST_CLUSTER"
    name: "&#f5f242&lEfekt ratunku"
    lore:
      - "&fWybierz animację aktywacji polisy."
      - "&7Dostępne dla rangi premium."
  close-button:
    slot: 26
    material: "BARRIER"
    name: "&c&lWyjście"
    lore:
      - "&7Kliknij, aby zamknąć menu."
  effects-menu:
    title: "&#f5f242&lWybór efektu"
    back:
      material: "ARROW"
      name: "&c&lPowrót"
      lore:
        - "&7Kliknij, aby wrócić do głównej zakładki."

protection:
  # Jeśli gracz ma ubezpieczenie i otrzyma śmiertelne obrażenia:
  restore-health: 8.0
  restore-food: true
  food-level: 20
  saturation: 6.0
  extinguish: true
  clear-negative-effects: false
  no-damage-ticks: 60

  # Gdy gracz ginie od VOID, przenieś go na spawn świata i zużyj ubezpieczenie.
  teleport-on-void: true

  sound: "ITEM_TOTEM_USE"
  particle: "TOTEM_OF_UNDYING"
  particle-count: 80

  # Pusta lista = ubezpieczenie działa na każdy typ śmiertelnych obrażeń.
  ignored-damage-causes: []

  effects:
    REGENERATION:
      duration: 900
      amplifier: 1
      ambient: false
      particles: true
      icon: true
    ABSORPTION:
      duration: 100
      amplifier: 1
      ambient: false
      particles: true
      icon: true
    FIRE_RESISTANCE:
      duration: 800
      amplifier: 0
      ambient: false
      particles: true
      icon: true

