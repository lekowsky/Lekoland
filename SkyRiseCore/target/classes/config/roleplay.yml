# ══════════════════════════════════════
# SkyRiseCore — Config RolePlay
# ══════════════════════════════════════

# Zasięg widoczności komend narracyjnych (/me, /do, /try) na czacie w blokach
rp-range: 20

# Czas wyświetlania tekstu nad głową gracza (w sekundach) dla /me, /do, /try
head-text-duration: 6

# Formaty czatu (MiniMessage)
formats:
  # /me: reprezentuje działanie postaci
  # Zmienne: {player}, {message}
  me: "<color:#D15DFF>* {player} {message} *"

  # /do: reprezentuje opis otoczenia/stanu
  # Zmienne: {player}, {message}
  do: "<color:#5D9DFF>* {message} * ({player})"

  # /try: reprezentuje próbę wykonania akcji (szansa 50/50)
  # Zmienne: {player}, {message}, {result}
  try: "<color:#FFAC5D>* {player} próbuje {message}... {result} *"

  # Wyniki dla komendy /try
  try-success: "<green>[UDANE]</green>"
  try-failure: "<red>[NIEUDANE]</red>"

  # Opis postaci (/opis) i opis miejsca (/opis2)
  # Zmienne: {player}, {message}
  opis: "<color:#FFEB5D>[OPIS] {message}"
  opis2: "<color:#5DFFEB>[MIEJSCE] {message}"
