name: SkyRiseCore
version: '1.0.0'
main: pl.skyrise.skyRiseCore.SkyRiseCore
api-version: '1.21'
description: All-in-one modular plugin
authors: [SkyRise]
softdepend: [Vault]

commands:
  skyrisecore:
    description: Główna komenda pluginu
    usage: /skyrisecore <reload|list|version>
    aliases: [src]
    permission: skyrise.admin
  adminchat:
    description: AdminChat — prywatny czat administracji
    usage: /ac [wiadomość]
    aliases: [ac]
    permission: skyrise.adminchat
  globalchat:
    description: Czat globalny
    usage: /g <wiadomość>
    aliases: [g]
  armorworld:
    description: Zarządzanie blokadami zbroi na światach
    usage: /armorworld <add|remove|list|items|off>
    aliases: [aw]
    permission: skyrise.armorworld.admin

permissions:
  skyrise.*:
    description: Dostęp do wszystkiego
    default: op
    children:
      skyrise.admin: true
      skyrise.adminchat: true
      skyrise.armorworld.admin: true
      skyrise.armorworld.bypass: true
      skyrise.batspawn.admin: true
      skyrise.globalchat: true
      skyrise.globalchat.bypass: true
  skyrise.admin:
    description: Dostęp do /skyrisecore
    default: op
  skyrise.adminchat:
    description: Dostęp do AdminChat
    default: op
  skyrise.armorworld.admin:
    description: Zarządzanie blokadami zbroi
    default: op
  skyrise.armorworld.bypass:
    description: Omijanie blokady zbroi na światach
    default: false
  skyrise.globalchat:
    description: Dostęp do czatu globalnego
    default: true
  skyrise.globalchat.bypass:
    description: Omijanie cooldownu czatu globalnego
    default: op
